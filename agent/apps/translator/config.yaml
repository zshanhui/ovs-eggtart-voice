# TranslatorApp configuration: pure translation without LLM
slv_url: "${OVS_SLV_URL:-ws://localhost:8621/v2v/stream}"
slv_config:
  asr_language: "zh"
  tts_language: "${OVS_TTS_LANG:-zh}"
  tts_speaker_id: null
  tts_speed: 1.0
  sample_rate: 16000
  vad: "silero"
  vad_silence_ms: 400
  multi_utterance: true

# Disable LLM (this is a pure translator app)
llm_backend: "noop"

# Translator configuration
translator_backend: "ctranslate2"
translator_url: "${OVS_TRANSLATOR_URL:-http://localhost:9001}"
translator_src_lang: "${OVS_SRC_LANG:-zho_Hans}"
translator_tgt_lang: "${OVS_TGT_LANG:-eng_Latn}"
translator_timeout_s: 5.0

# Audio devices
audio_input_device: null
audio_output_device: null
audio_input_sample_rate: 16000
audio_output_sample_rate: 24000

# Client-side VAD
client_vad_backend: "auto"
client_vad_threshold: null
client_vad_speech_min_ms: 200
client_vad_silence_ms: 600
client_vad_drive_eos: false

# Pipeline mode
pipeline_mode: "always_on"
sleep_timeout_s: 30.0

# Timeouts
asr_final_timeout_s: 3.0

# Session config
session_max_input_tokens: null
session_tokenizer_model: "Qwen/Qwen3-4B-AWQ"

# Logging
log_level: "INFO"
