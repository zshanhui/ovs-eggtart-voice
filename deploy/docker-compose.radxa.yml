# Seeed Local Voice — Rockchip RK3588 (radxa).
#
# Usage (on radxa, repo root as cwd):
#   docker compose -f deploy/docker-compose.radxa.yml up -d
#
# Same Docker image as deploy/docker-compose.rk.yml (RK3576 cat-remote);
# only the host bind-mount paths differ between the two boards.
#
# Hardware: needs /dev (RKNN NPU char devs) and host networking. The image
# is built against Debian 12 slim; see deploy/docker/Dockerfile.rk.

services:
  speech:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.rk
    image: seeed-local-voice:rk
    container_name: seeed-local-voice
    privileged: true
    init: true
    network_mode: host
    mem_limit: 7500m
    memswap_limit: 7500m
    volumes:
      - /dev:/dev
      - /usr/lib/librknnrt.so:/usr/lib/librknnrt.so:ro
      # TTS assets
      - /home/radxa/models/tts/matcha-icefall-zh-en:/opt/tts/models/matcha-icefall-zh-en:ro
      - /home/radxa/models/tts/matcha-s64.rknn:/opt/tts/models/matcha-s64.rknn:ro
      - /home/radxa/models/tts/vocos-16khz-600.rknn:/opt/tts/models/vocos-16khz-600.rknn:ro
      - /home/radxa/matcha-data:/home/radxa/matcha-data:ro
      # ASR assets
      - /home/radxa/models:/opt/asr/models:ro
      - /home/radxa/lib/librkllmrt.so:/opt/asr/lib/librkllmrt.so:ro
    environment:
      - SEEED_LOCAL_VOICE_PROFILE=${SEEED_LOCAL_VOICE_PROFILE:-rk3588-default}
      # ── ASR ─────────────────────────────────────────────────────────
      - ASR_BACKEND=qwen3_asr_rk
      - ASR_DECODER_TYPE=rkllm
      - ASR_PLATFORM=rk3588
      - ASR_ENABLED_CPUS=4
      - ASR_NPU_CORE_MASK=NPU_CORE_AUTO
      - ASR_MODEL_DIR=/opt/asr/models
      - RKLLM_LIB_PATH=/opt/asr/lib/librkllmrt.so
      # True streaming: 400 ms chunks + left-context encoder + webrtcvad
      # endpoint pre-fire → near-zero stop→final latency. Required for the
      # multi_utterance V2V path (see docs/api/v2v-stream.md).
      - QWEN3_ASR_STREAM_TRUE=1
      # ── TTS ─────────────────────────────────────────────────────────
      - TTS_BACKEND=matcha_rknn
      - TTS_MODEL_DIR=/opt/tts/models
      - MATCHA_MAX_PHONEMES=64
      - MATCHA_MODEL_SEQ_LEN=80
      - MATCHA_USE_ORT=1
      - MATCHA_MODEL=matcha-s64.rknn
      - VOCOS_MODEL=vocos-16khz-600.rknn
      - VOCOS_FRAMES=600
      - MATCHA_ONNX_PATH=/home/radxa/matcha-data/model-steps-3.onnx
      # ── Misc ────────────────────────────────────────────────────────
      - MODEL_DIR=/opt/tts/models
    restart: unless-stopped
