# OpenVoiceStream — production deployment.
#
# Usage:
#   LANGUAGE_MODE=en docker compose -f deploy/docker-compose.yml up -d
#   OVS_PROFILE=jetson-multilang-highperf docker compose -f deploy/docker-compose.yml up -d
#
# Models auto-download on first start (~1-2 min) and persist in a Docker volume.
# Set LANGUAGE_MODE to "zh_en" (default, Chinese+English), "en" (English only),
# or OVS_PROFILE=jetson-multilang-highperf for Qwen3 ASR/TTS.

services:
  speech:
    image: sensecraft-missionpack.seeed.cn/solution/seeed-local-voice:jetson-v1.13-highperf
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.jetson
      args:
        LANGUAGE_MODE: ${LANGUAGE_MODE:-zh_en}
    # NOTE: this file covers the Jetson target. RK and Raspberry Pi run on
    # different hosts (different runtime, different volumes) and have their
    # own compose files: deploy/docker-compose.rk.yml, deploy/docker-compose.rpi.yml.
    runtime: nvidia
    ipc: host
    ports:
      - "8621:8000"
    environment:
      - LANGUAGE_MODE=${LANGUAGE_MODE:-zh_en}
      - OVS_PROFILE=${OVS_PROFILE:-}
      - OVS_PROFILE_JSON=${OVS_PROFILE_JSON:-}
      # Open-dialogue endpointing defaults. Override in .env for product tuning.
      - OVS_VAD_BACKEND=${OVS_VAD_BACKEND:-silero}
      - OVS_VAD_SILENCE_MS=${OVS_VAD_SILENCE_MS:-400}
      - QWEN3_EDGELLM_JETSON_ROOT=${QWEN3_EDGELLM_JETSON_ROOT:-/opt/qwen3-edgellm-jetson}
      - QWEN3_ARTIFACT_MANIFEST=${QWEN3_ARTIFACT_MANIFEST:-}
      - QWEN3_ARTIFACT_SET=${QWEN3_ARTIFACT_SET:-}
      - QWEN3_ARTIFACT_ROOT=${QWEN3_ARTIFACT_ROOT:-/opt/models/qwen3-edgellm}
      - QWEN3_HF_REPO_ID=${QWEN3_HF_REPO_ID:-}
      - QWEN3_HF_REVISION=${QWEN3_HF_REVISION:-main}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://huggingface.co}
      - TTS_PROVIDER=${TTS_PROVIDER:-cuda}
      - TTS_DEFAULT_SID=${TTS_DEFAULT_SID:-0}
      - TTS_DEFAULT_SPEED=${TTS_DEFAULT_SPEED:-0.85}
      - PARAFORMER_PREROLL_MS=${PARAFORMER_PREROLL_MS:-100}
      - TTS_NUM_THREADS=4
      - STREAMING_ASR_PROVIDER=cuda
      - STREAMING_ASR_NUM_THREADS=4
      - CUDA_MODULE_LOADING=LAZY
      - LD_LIBRARY_PATH=/usr/local/lib/python3.10/dist-packages/onnxruntime/capi:/host-cuda:/host-nvidia-libs:/host-libs
      - PYTHONPATH=/opt/speech:/usr/lib/python3.10/dist-packages
      - ORT_CUDA_ARENA_EXTEND_STRATEGY=kSameAsRequested
    volumes:
      - speech-models:/opt/models
      - /usr/local/cuda/lib64:/host-cuda:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/host-nvidia-libs:ro
      - /lib/aarch64-linux-gnu:/host-libs:ro
      - /usr/lib/python3.10/dist-packages/tensorrt:/usr/lib/python3.10/dist-packages/tensorrt:ro
      - /usr/src/tensorrt:/usr/src/tensorrt:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${OVS_MEMORY_LIMIT:-6G}

  translator:
    build:
      context: ..
      dockerfile: services/translator/Dockerfile
    image: seeed-local-voice:translator-latest
    runtime: nvidia
    ports:
      - "9001:9001"
    environment:
      - TRANSLATOR_DEVICE=${TRANSLATOR_DEVICE:-cuda}
      - TRANSLATOR_DEVICE_INDEX=${TRANSLATOR_DEVICE_INDEX:-0}
      - TRANSLATOR_MODEL_PATH=${TRANSLATOR_MODEL_PATH:-/models/nllb-200-distilled-600m-ct2-int8}
    volumes:
      - translator-models:/models:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${TRANSLATOR_MEMORY_LIMIT:-4G}
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  speech-models:
    name: speech-models
  translator-models:
    name: translator-models
